<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Singularity. Access the latest space news, planet info, and satellite data.">
    <title>Singularity — Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
    <div class="auth-page">
        <!-- Animated Background -->
        <div class="auth-bg">
            <div class="nebula nebula-1"></div>
            <div class="nebula nebula-2"></div>
            <div class="nebula nebula-3"></div>
        </div>

        <!-- Floating Particles -->
        <div class="auth-particles" id="authParticles"></div>

        <!-- Star Field -->
        <div class="star-field" id="starField"></div>

        <!-- Login Card -->
        <div class="auth-card">
            <div class="auth-header">
                <span class="auth-logo">🚀</span>
                <h2>Welcome Back</h2>
                <p>Sign in to continue your space journey</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="auth-flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form class="auth-form" method="POST" action="{{ url_for('login') }}" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
                    <span class="input-icon">👤</span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                    <span class="input-icon">🔒</span>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">
                    LAUNCH →
                </button>
            </form>

            <div class="auth-toggle">
                Don't have an account? <a href="{{ url_for('signup') }}">Create one</a>
            </div>
        </div>
    </div>

    <script>
        // Generate stars
        const starField = document.getElementById('starField');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.width = (1 + Math.random() * 2) + 'px';
            star.style.height = star.style.width;
            starField.appendChild(star);
        }

        // Generate floating particles
        const particles = document.getElementById('authParticles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (8 + Math.random() * 12) + 's';
            p.style.animationDelay = Math.random() * 8 + 's';
            p.style.width = (1 + Math.random() * 3) + 'px';
            p.style.height = p.style.width;
            particles.appendChild(p);
        }
    </script>
</body>
</html>
